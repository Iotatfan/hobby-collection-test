name: Playwright Tests on Production

on:
  workflow_dispatch:
  repository_dispatch:
    types: [fe-updated, be-updated]

jobs:
  test-prod:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Automation Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # Optional but useful to confirm deployed env is reachable
      - name: Verify production URLs
        run: |
          curl -I "$FE_BASE_URL"
          curl -I "$API_BASE_URL" || true
        env:
          FE_BASE_URL: ${{ secrets.FE_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}

      - name: Run E2E tests
        run: npx playwright test --project=e2e-chromium
        env:
          FE_BASE_URL: ${{ secrets.FE_BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Run read-only API tests
        run: npx playwright test --project=api-read
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload raw Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30