name: Playwright E2E & API Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Test Repository
      uses: actions/checkout@v4

    - name: Checkout Backend
      uses: actions/checkout@v4
      with:
        repository: Iotatfan/hobby-collection-be
        path: backend
        # A Personal Access Token (PAT) is required because this repo is private
        token: ${{ secrets.PAT_TOKEN }}
        
    - name: Checkout Frontend
      uses: actions/checkout@v4
      with:
        repository: Iotatfan/hobby-collection
        path: frontend

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.21.0' # Adjust this to match your backend Go version

    - name: Start Backend
      run: |
        cd backend
        go mod download
        # Starts the go app in the background
        go run main.go &
      env:
        PORT: 8080

    - name: Start Frontend
      run: |
        cd frontend
        npm install
        # Starts the React app in the background. If you use Vite, this might be 'npm run dev'
        npm start &
      env:
        REACT_APP_API_URL: http://localhost:8080

    - name: Install Playwright Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Wait for services to start
      run: npx wait-on http://127.0.0.1:8080 http://127.0.0.1:3000
      env:
        WAIT_ON_TIMEOUT: 60000

    - name: Run Playwright tests
      run: npx playwright test
      env:
        API_BASE_URL: http://localhost:8080
        FE_BASE_URL: http://localhost:3000
        TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
